name: deploy-container

on:
  push:
    branches:
      - main
    # 🔥 Remove paths filter for now (add later after testing)
    # paths:
    #   - 'packages/container/**'

defaults:
  run:
    working-directory: packages/container

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      

      # ✅ Install dependencies
      - name: Install dependencies
        run: npm install

      # ✅ Build project
      - name: Build project
        run: npm run build

      # 🔍 Debug: Check dist folder exists
      - name: Check dist folder
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ dist folder not found"
            exit 1
          fi

      # ✅ Configure AWS credentials
      - name: Test AWS connection
        run: aws s3 ls
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # ✅ Deploy to S3
      - name: Deploy to S3
        run: aws s3 sync dist s3://${{ secrets.AWS_S3_BUCKET_NAME }}/container/latest --delete

      # 🚀 Optional: CloudFront Invalidation (uncomment if using CDN)
      # - name: Invalidate CloudFront
      #   run: aws cloudfront create-invalidation \
      #         --distribution-id ${{ secrets.AWS_DISTRIBUTION_ID }} \
      #         --paths "/*"